<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DokaKegiatan — 403 Forbidden</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── HIDE SCROLLBAR ── */
    * { box-sizing:border-box; margin:0; padding:0; scrollbar-width:none; -ms-overflow-style:none; }
    *::-webkit-scrollbar { display:none; }

    html, body { height:100%; font-family:'Plus Jakarta Sans',sans-serif; overflow:hidden; }

    .ep-page {
      position:fixed; inset:0;
      overflow-y:auto;
    }

    .ep-wrap {
      min-height:100%;
      background:linear-gradient(135deg, #0f0e2e 0%, #1e1b4b 40%, #2d1b69 70%, #1a0a3d 100%);
      position:relative;
      display:flex; align-items:center; justify-content:center;
      padding:60px 24px 48px;
      overflow:hidden;
    }

    canvas {
      position:absolute; inset:0;
      z-index:0; pointer-events:none;
    }

    .orb {
      position:absolute; border-radius:50%; pointer-events:none; z-index:0;
    }

    .ep-inner {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      align-items:center; text-align:center;
      width:100%; max-width:580px;
    }

    /* ── ICON RING ── */
    .ep-icon-wrap { position:relative; margin-bottom:28px; }
    .ep-icon-ring {
      width:110px; height:110px; border-radius:50%;
      background:linear-gradient(135deg, #4f46e5, #7c3aed);
      display:grid; place-items:center;
      position:relative;
      animation:iconRingPulse 2.5s ease-in-out infinite;
    }
    @keyframes iconRingPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(129,140,248,.5),0 8px 32px rgba(79,70,229,.5); transform:scale(1); }
      50%      { box-shadow:0 0 0 22px rgba(129,140,248,0),0 12px 50px rgba(79,70,229,.7); transform:scale(1.05); }
    }
    .ep-icon-ring::before {
      content:''; position:absolute; inset:-10px; border-radius:50%;
      border:2px dashed rgba(255,255,255,.14);
      animation:ringRotate 12s linear infinite;
    }
    .ep-icon-ring::after {
      content:''; position:absolute; inset:-20px; border-radius:50%;
      border:1.5px dashed rgba(255,255,255,.06);
      animation:ringRotate 20s linear infinite reverse;
    }
    @keyframes ringRotate { to{transform:rotate(360deg)} }
    .ep-icon { font-size:3rem; color:#fff; }
    @keyframes iconFloat { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
    .icon-anim { animation:iconFloat 3s ease-in-out infinite; }

    /* Badge */
    .ep-badge {
      position:absolute; bottom:-8px; right:-8px;
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,#f59e0b,#f97316);
      display:grid; place-items:center;
      border:3px solid #0f0e2e;
      box-shadow:0 4px 14px rgba(245,158,11,.5);
      animation:badgePop 2s ease-in-out infinite alternate;
    }
    @keyframes badgePop { from{transform:scale(1) rotate(0)} to{transform:scale(1.12) rotate(8deg)} }
    .ep-badge i { color:#fff; font-size:.9rem; }

    /* ── CODE ── */
    .ep-code {
      font-family:'Nunito',sans-serif; font-weight:900;
      font-size:clamp(5rem,18vw,9.5rem);
      line-height:.88; margin-bottom:14px;
      letter-spacing:-4px;
      background:linear-gradient(135deg, #818cf8, #a78bfa, #c4b5fd);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* ── TITLE ── */
    .ep-title {
      font-family:'Nunito',sans-serif; font-weight:900;
      font-size:clamp(1.35rem,4vw,2rem);
      color:#fff; margin-bottom:12px;
      text-shadow:0 2px 20px rgba(255,255,255,.12);
    }

    /* ── DESC ── */
    .ep-desc {
      font-size:clamp(.85rem,2vw,.95rem);
      color:rgba(255,255,255,.55);
      line-height:1.75; margin-bottom:22px;
      max-width:440px;
    }

    /* ── INFO BOX ── */
    .ep-info {
      display:flex; align-items:flex-start; gap:10px;
      background:rgba(79,70,229,.1); border:1px solid rgba(129,140,248,.25);
      border-radius:13px; padding:14px 16px;
      margin-bottom:28px; width:100%;
      font-size:.82rem; color:rgba(255,255,255,.6);
      line-height:1.6; text-align:left;
      backdrop-filter:blur(6px);
    }
    .ep-info-icon { font-size:1rem; color:#818cf8; flex-shrink:0; margin-top:1px; }

    /* ── BUTTONS ── */
    .ep-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:36px; }
    .ep-btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:13px 24px; border-radius:13px;
      font-weight:700; font-size:.9rem; text-decoration:none;
      font-family:'Plus Jakarta Sans',sans-serif;
      transition:transform .2s,box-shadow .2s;
    }
    .ep-btn:hover { transform:translateY(-3px); }
    .ep-btn-p {
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      color:#fff; box-shadow:0 6px 24px rgba(79,70,229,.5);
    }
    .ep-btn-p:hover { box-shadow:0 10px 32px rgba(79,70,229,.5); }
    .ep-btn-s {
      background:transparent;
      border:1.5px solid rgba(129,140,248,.4);
      color:#818cf8;
    }
    .ep-btn-s:hover { background:rgba(79,70,229,.15); }

    /* ── BRAND ── */
    .ep-brand {
      display:flex; align-items:center; gap:10px;
      opacity:.38; transition:opacity .25s; cursor:default;
    }
    .ep-brand:hover { opacity:.65; }
    .ep-brand-icon {
      width:34px; height:34px; border-radius:9px;
      background:rgba(255,255,255,.12);
      display:grid; place-items:center; color:#fff; font-size:1.05rem;
      animation:brandFloat 5s ease-in-out infinite;
    }
    @keyframes brandFloat { 0%,100%{transform:translateY(0) rotate(0)} 33%{transform:translateY(-3px) rotate(4deg)} 66%{transform:translateY(2px) rotate(-3deg)} }
    .ep-brand-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; color:#fff; letter-spacing:-.3px; }
    .ep-brand-name span { color:rgba(255,255,255,.4); }

    

    /* ── RESPONSIVE ── */
    @media (max-width:768px) {
      .ep-wrap { padding:40px 16px 36px; }
      .ep-icon-ring { width:88px; height:88px; }
      .ep-icon { font-size:2.4rem !important; }
      .ep-btns { flex-direction:column; align-items:stretch; }
      .ep-btn  { justify-content:center; }
      .ep-code { letter-spacing:-2px; }
    }
    @media (max-width:480px) {
      .ep-icon-ring { width:74px; height:74px; }
      .ep-icon { font-size:2rem !important; }
    }
    @media (min-height:800px) {
      .ep-wrap { align-items:center; }
    }
  </style>
</head>
<body>
<div class="ep-page">
<div class="ep-wrap">

  <canvas id="ep-canvas"></canvas>

  <!-- Orbs -->
  <div class="orb" style="width:320px;height:320px;top:-100px;right:-80px;background:radial-gradient(circle,rgba(79,70,229,.25),transparent 70%);animation:orbF1 9s ease infinite;"></div>
  <div class="orb" style="width:240px;height:240px;bottom:-70px;left:-60px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 70%);animation:orbF2 12s ease infinite;"></div>

  <style>
    @keyframes orbF1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-15px) scale(1.06)} 66%{transform:translate(-10px,12px) scale(.96)} }
    @keyframes orbF2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-15px,20px) scale(.94)} 66%{transform:translate(12px,-10px) scale(1.06)} }
  </style>

  <div class="ep-inner">

    <!-- Icon -->
    <div class="ep-icon-wrap">
      <div class="ep-icon-ring">
        <i class="bi bi-shield-lock-fill ep-icon icon-anim"></i>
      </div>
      <div class="ep-badge">
        <i class="bi bi-x-lg"></i>
      </div>
    </div>

    <!-- Code -->
    <div class="ep-code">403</div>

    <!-- Title -->
    <h1 class="ep-title">Akses Ditolak</h1>

    <!-- Desc -->
    <p class="ep-desc">Maaf, Anda tidak memiliki izin untuk mengakses halaman ini. Silakan hubungi administrator sistem jika Anda merasa ini adalah kesalahan.</p>

    <!-- Extra content -->
    

    <!-- Info box -->
    <div class="ep-info">
      <i class="bi bi-info-circle-fill ep-info-icon"></i>
      <span>Kode Error: <strong style="color:#c4b5fd;">403 Forbidden</strong> — Anda tidak memiliki hak akses ke resource ini.</span>
    </div>

    <!-- Buttons -->
    <div class="ep-btns">
      <a href="dashboard.html" class="ep-btn ep-btn-p"><i class="bi bi-house-fill"></i> Kembali ke Dashboard</a>
      <a href="javascript:history.back()" class="ep-btn ep-btn-s"><i class="bi bi-arrow-left"></i> Halaman Sebelumnya</a>
    </div>

    <!-- Brand -->
    <div class="ep-brand">
      <div class="ep-brand-icon"><i class="bi bi-camera-reels-fill"></i></div>
      <span class="ep-brand-name">Doka<span>Kegiatan</span></span>
    </div>

  </div>
</div>
</div>

<script>
// Particle Canvas
(function(){
  const canvas=document.getElementById('ep-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  const EMOJIS=['🔒','🛡','🚫','⛔','🔐','✨','⭐','💫'];
  const COLORS=['#818cf8','#a78bfa','#c4b5fd','#4f46e5','#7c3aed'];
  const COUNT=Math.min(40,Math.floor(window.innerWidth/27));

  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function make(){
    const e=Math.random()>.5;
    return {
      x:rnd(0,W),y:rnd(0,H),vx:rnd(-.4,.4),vy:rnd(-.6,-.1),
      size:rnd(e?12:3,e?22:8),alpha:rnd(.06,.22),
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      emoji:e?EMOJIS[Math.floor(Math.random()*EMOJIS.length)]:null,
      rotate:rnd(0,Math.PI*2),rotV:rnd(-.015,.015),
      pulse:rnd(0,Math.PI*2),pulseV:rnd(.01,.04),
    };
  }
  function init(){ resize(); particles=Array.from({length:COUNT},make); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const p of particles){
      ctx.save();
      ctx.globalAlpha=p.alpha+.04*Math.sin(p.pulse);
      ctx.translate(p.x,p.y); ctx.rotate(p.rotate);
      if(p.emoji){ ctx.font=`${p.size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.emoji,0,0); }
      else{ ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); }
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rotate+=p.rotV; p.pulse+=p.pulseV;
      if(p.y<-40) p.y=H+40;
      if(p.x<-40) p.x=W+40;
      if(p.x>W+40) p.x=-40;
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init(); draw();
})();


</script>
</body>
</html>
